services:
  lucas-server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    container_name: lucas-server
    environment:
      PORT: "8787"
      HOST: "0.0.0.0"
      CACHE_ENCRYPTION_KEY_BASE64: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      ADMIN_PANEL_URL: ""
      ADMIN_PANEL_TOKEN: ""
      MAHSA_SOURCES: "https://mahsaalert.app/api/clusters,https://mahsaalert.app/api/layers"
      TELEGRAM_API_ID: "0"
      TELEGRAM_API_HASH: ""
      TELEGRAM_STRING_SESSION: ""
    ports:
      - "8787:8787"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 3

  client-check:
    build:
      context: .
      dockerfile: docker/client-check.Dockerfile
    container_name: lucas-client-check
